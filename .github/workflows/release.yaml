name: Upload release assets

# Runs on release tags (vX.Y.Z) and pre-release tags (vX.Y.Z-alpha.1, -beta, -rc).
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

jobs:
  # Version gate + the generated database docs (needs xsltproc/libxml2).
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: update & install tools
        run: sudo apt-get update && sudo apt-get install -y xsltproc libxml2-utils

      - name: make
        run: make tests

      - name: Version in common/version.h must match release tag
        run: |
          export CANBOAT_VERSION=$(sed -En 's/#define VERSION "([^"]+)"/\1/p' common/version.h)
          echo "Checking if docs/canboat.json contains \"CANboat version v${CANBOAT_VERSION}\""
          grep -q "CANboat version v${CANBOAT_VERSION}" docs/canboat.json
          echo "Checking if docs/canboat.json contains version \"Version\":\"${CANBOAT_VERSION}\""
          grep -q "\"Version\":\"${CANBOAT_VERSION}\"" docs/canboat.json
          echo "Checking if docs/canboat.xml contains \"CANboat version v${CANBOAT_VERSION}\""
          grep -q "CANboat version v${CANBOAT_VERSION}" docs/canboat.xml
          echo "Checking if docs/canboat.xml contains \"<Version>${CANBOAT_VERSION}</Version>\""
          grep -q "<Version>${CANBOAT_VERSION}</Version>" docs/canboat.xml
          export SCHEMA_VERSION=$(sed -En 's/#define SCHEMA_VERSION "([^"]+)"/\1/p' common/version.h)
          echo "Checking if docs/canboat.xsd contains \"xs:version=\"${SCHEMA_VERSION}\""
          grep -q "xs:schema version=\"${SCHEMA_VERSION}\"" docs/canboat.xsd
          echo "Checking if docs/canboat.json contains version \"SchemaVersion\":\"${SCHEMA_VERSION}\""
          grep -q "\"SchemaVersion\":\"${SCHEMA_VERSION}\"" docs/canboat.json
          echo "Github tag should match version in common/version.h"
          test "${GITHUB_REF##*/}" == "v${CANBOAT_VERSION}"

      - name: Add release assets
        uses: softprops/action-gh-release@v1
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            docs/canboat.json
            docs/canboat.xml
            docs/canboat.xsd

  # Native linux/macOS: the full C-tool archive plus the keel binary, one
  # runner per platform. Asset names match keel/keel's expected
  # keel-$(uname|lc)-$(uname -m) and the Makefile's rel/<platform>/ layout.
  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: x86_64
          - runner: ubuntu-24.04-arm
            os: linux
            arch: aarch64
          - runner: macos-latest
            os: darwin
            arch: arm64
          - runner: macos-13
            os: darwin
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build C tools
        run: make

      - name: Package canboat archive
        run: |
          plat="${{ matrix.os }}-${{ matrix.arch }}"
          tar czf "canboat-${plat}-${GITHUB_REF_NAME}.tar.gz" --exclude venv -C "rel/${plat}" .

      - name: Build keel
        run: |
          cargo build --release --manifest-path keel/Cargo.toml
          cp keel/target/release/keel "keel-${{ matrix.os }}-${{ matrix.arch }}"

      - name: Add release assets
        uses: softprops/action-gh-release@v1
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            canboat-${{ matrix.os }}-${{ matrix.arch }}-${{ github.ref_name }}.tar.gz
            keel-${{ matrix.os }}-${{ matrix.arch }}

  # 32-bit ARM (e.g. Raspberry Pi): static musl cross-build of both the C tools
  # and keel, mirroring the ci.yml build-armv7-musl setup.
  armv7:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TARGET: armv7l-linux-musleabihf
      RUST_TARGET: armv7-unknown-linux-musleabihf
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y make autoconf

      - name: Setup musl cross compiler
        run: |
          mkdir "$HOME/musl" && cd "$HOME/musl"
          wget "https://keversoft.com/downloads/${TARGET}-cross.tgz"
          tar xf "${TARGET}-cross.tgz"

      - name: Build C tools (musl)
        run: |
          export PATH="$PATH:$HOME/musl/${TARGET}-cross/bin"
          export CC="$HOME/musl/${TARGET}-cross/bin/${TARGET}-gcc"
          export BUILDDIR="rel/${TARGET}"
          make

      - name: Package canboat archive
        run: |
          tar czf "canboat-linux-armv7l-${GITHUB_REF_NAME}.tar.gz" --exclude venv -C "rel/${TARGET}" .

      - name: Build keel (static musl)
        run: |
          rustup target add "${RUST_TARGET}"
          cc="$HOME/musl/${TARGET}-cross/bin/${TARGET}-gcc"
          export CARGO_TARGET_ARMV7_UNKNOWN_LINUX_MUSLEABIHF_LINKER="$cc"
          export CC_armv7_unknown_linux_musleabihf="$cc"
          cargo build --release --manifest-path keel/Cargo.toml --target "${RUST_TARGET}"
          cp "keel/target/${RUST_TARGET}/release/keel" keel-linux-armv7l

      - name: Add release assets
        uses: softprops/action-gh-release@v1
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            canboat-linux-armv7l-${{ github.ref_name }}.tar.gz
            keel-linux-armv7l

  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
        run:
          shell: C:\tools\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
    steps:
      - name: checkout repo
        uses: actions/checkout@v3

      - name: Set up Cygwin
        uses: egor-tensin/setup-cygwin@v4
        with:
            packages: make gcc-core zip
            hardlinks: 1

      - name: make
        run: make -C /cygdrive/d/a/canboat/canboat

      - name: zip
        run: |
          cd /cygdrive/d/a/canboat/canboat/rel/cygwin*/
          zip "../canboat-windows-x86_64-${GITHUB_REF##*/}.zip" *.exe *.dll

      - name: Build keel (MSVC)
        shell: pwsh
        run: |
          cargo build --release --manifest-path keel/Cargo.toml
          Copy-Item keel/target/release/keel.exe keel-windows-x86_64.exe

      - name: Add release assets
        uses: softprops/action-gh-release@v1
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            rel/*.zip
            keel-windows-x86_64.exe
