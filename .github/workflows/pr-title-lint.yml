name: PR Title

# Enforce Conventional Commit PR titles. PRs are merged with the title as the
# commit subject, and release-please derives the next version + CHANGELOG from
# these, so a malformed title fails the check and blocks the merge.

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  validate-pr-title:
    name: validate-pr-title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            revert
            docs
            test
            build
            ci
            chore
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: >-
            The PR title subject "{subject}" must start with a lowercase letter,
            e.g. "feat(130845): decode satellites-in-view".
