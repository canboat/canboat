pgn: 130322
id: currentStationData
description: Current Station Data
type: Fast
priority: 6
interval: 1000
missing:
- SampleData
fields:
- id: mode
  name: Mode
  type: LOOKUP
  bits: 4
  lookup: RESIDUAL_MODE
- id: state
  name: State
  type: LOOKUP
  bits: 3
  lookup: FLOOD_STATE
- id: reserved
  name: Reserved
  type: RESERVED
  bits: 1
- id: measurementDate
  name: Measurement Date
  type: DATE
- id: measurementTime
  name: Measurement Time
  type: TIME
  bits: 32
  resolution: 0.0001
  description: Seconds since midnight
  specialValues: 3
  rangeMin: 0.0
  rangeMax: 86401.0
- id: stationLatitude
  name: Station Latitude
  type: GEO_LAT_FIX32
  rangeMin: -90.0
  rangeMax: 90.0
- id: stationLongitude
  name: Station Longitude
  type: GEO_LON_FIX32
  rangeMin: -180.0
  rangeMax: 180.0
- id: measurementDepth
  name: Measurement Depth
  type: LENGTH_UFIX32_CM
  description: Depth below transducer
- id: currentSpeed
  name: Current speed
  type: SPEED_UFIX16_CM
- id: currentFlowDirection
  name: Current flow direction
  type: ANGLE_UFIX16
- id: waterTemperature
  name: Water Temperature
  type: TEMPERATURE
- id: stationId
  name: Station ID
  type: STRING_LAU
  primaryKey: true
- id: stationName
  name: Station Name
  type: STRING_LAU
