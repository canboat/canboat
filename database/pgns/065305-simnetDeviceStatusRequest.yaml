pgn: 65305
id: simnetDeviceStatusRequest
description: 'Simnet: Device Status Request'
type: Single
variantOrder: 2
interval: 1000
explanation: This PGN is sent by an active AutoPilot head controller (AP, MFD, Triton2). It is used by the AC (AutoPilot Controller) to verify that there is an active controller. If this PGN is not sent regularly the AC may report an error and go to standby.
fields:
- id: manufacturerCode
  name: Manufacturer Code
  type: LOOKUP
  bits: 11
  description: Simrad
  match: 1857
  lookup: MANUFACTURER_CODE
- id: reserved
  name: Reserved
  type: RESERVED
  bits: 2
- id: industryCode
  name: Industry Code
  type: LOOKUP
  bits: 3
  description: Marine Industry
  match: 4
  lookup: INDUSTRY_CODE
- id: model
  name: Model
  type: LOOKUP
  bits: 8
  lookup: SIMNET_DEVICE_MODEL
- id: report
  name: Report
  type: LOOKUP
  bits: 8
  description: Send Status
  match: 3
  lookup: SIMNET_DEVICE_REPORT
  primaryKey: true
- id: spare6
  name: Spare
  type: SPARE
  bits: 32
samples:
- raw: "2023-01-01-00:00:00.000,7,65305,11,255,8,41,9f,01,03,00,00,00,00"  # from merrimac-2022.raw
  expects:
    manufacturerCode: "Simrad"
    industryCode: "Marine Industry"
    model: "Other device"
    report: "Send Status"
- raw: "2023-01-01-00:00:00.000,7,65305,10,255,8,41,9f,00,03,04,00,00,00"  # from merrimac-actisense-serial-2011.raw
  expects:
    manufacturerCode: "Simrad"
    industryCode: "Marine Industry"
    model: "AC"
    report: "Send Status"
- raw: "2023-01-01-00:00:00.000,7,65305,10,255,8,41,9f,00,03,00,00,00,00"  # from merrimac-actisense-serial-2011.raw
  expects:
    manufacturerCode: "Simrad"
    industryCode: "Marine Industry"
    model: "AC"
    report: "Send Status"
