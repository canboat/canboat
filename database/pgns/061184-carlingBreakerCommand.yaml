pgn: 61184
id: carlingBreakerCommand
description: 'Carling: Breaker Command'
type: Single
variantOrder: 5
priority: 2
explanation: Addresses up to 19 breakers on a Carling digital switching panel via three bitmap fields. Breakers 1 to 8 are
  in Breaker Mapping 1, 9 to 16 in Breaker Mapping 2, and 17 to 19 in Breaker Mapping 3.
