pgn: 129796
id: aisAcknowledge
description: AIS Acknowledge
type: Fast
priority: 7
interval: irregular
url: https://web.archive.org/web/20251212005646/www.itu.int/rec/R-REC-M.1371-5-201402-I/en
fields:
- id: messageId
  name: Message ID
  type: LOOKUP
  bits: 6
  lookup: AIS_MESSAGE_ID
- id: repeatIndicator
  name: Repeat Indicator
  type: LOOKUP
  bits: 2
  lookup: REPEAT_INDICATOR
- id: sourceId
  name: Source ID
  type: MMSI
  primaryKey: true
  rangeMin: 2000000.0
  rangeMax: 999999999.0
- id: reserved
  name: Reserved
  type: RESERVED
  bits: 1
- id: aisTransceiverInformation
  name: AIS Transceiver information
  type: LOOKUP
  bits: 5
  lookup: AIS_TRANSCEIVER
- id: spare6
  name: Spare
  type: SPARE
  bits: 2
- repeat:
    fields:
    - id: destinationId
      name: Destination ID
      type: MMSI
      primaryKey: true
      rangeMin: 2000000.0
      rangeMax: 999999999.0
    - id: sequenceNumber
      name: Sequence Number
      type: UNSIGNED_INTEGER
      bits: 2
      specialValues: 0
      rangeMin: 0.0
      rangeMax: 3.0
    - id: reserved9
      name: Reserved
      type: RESERVED
      bits: 6
