pgn: 130823
id: navicoDataTypeSourceDirectoryFullReport
description: 'Navico: Data Type Source Directory, Full Report'
type: Fast
variantOrder: 3
missing:
- Fields
- FieldLengths
- Resolution
explanation: 'Fuller counterpart to the Report Type 5 directory: the same {Length, Type, Data Type, Value} record list, but
  covering every data type the reporting object owns rather than a summary subset, so it typically carries the bound-source
  NAME entries. Uses the identical record format as Report Type 5 and the PGN 130822 Command 6 Object Dump.'
fields:
- id: manufacturerCode
  name: Manufacturer Code
  type: LOOKUP
  bits: 11
  description: Navico
  match: 275
  lookup: MANUFACTURER_CODE
- id: reserved
  name: Reserved
  type: RESERVED
  bits: 2
- id: industryCode
  name: Industry Code
  type: LOOKUP
  bits: 3
  description: Marine Industry
  match: 4
  lookup: INDUSTRY_CODE
- id: reserved4
  name: Reserved
  type: RESERVED
  bits: 8
- id: spare5
  name: Spare
  type: SPARE
  bits: 8
- id: reportType
  name: Report Type
  type: UINT8
  description: Data-type source directory (full report)
  match: 6
- id: part
  name: Part
  type: UINT8
  description: Sequence/part number of the directory report
- id: spare8
  name: Spare
  type: SPARE
  bits: 8
- id: length
  name: Length
  type: DYNAMIC_FIELD_LENGTH
  bits: 8
  description: 'Bytes following in this record: a type byte, a 16-bit data-type id and the value'
  dynamicFieldLength: true
  dynamicFieldLengthOverhead: 3
- id: type
  name: Type
  type: UINT8
  description: Value encoding/class for this entry (e.g. 2 = single-byte value, 9 = bound-source NAME wrapper)
- id: dataType
  name: Data Type
  type: LOOKUP
  bits: 16
  lookup: NAVICO_DATA_TYPE
- id: value
  name: Value
  type: DYNAMIC_FIELD_VALUE
  description: Tagged value for this data type. When a source is bound to the data type it is a NAME wrapper (0x0A 0x00 followed
    by the source device's 8-byte NMEA 2000 NAME); a zero-length or single 0x00 value means none/auto; other data types carry
    small typed values.
repeating1:
  count: 4
  start: 9
