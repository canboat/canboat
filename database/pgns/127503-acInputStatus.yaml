- raw: "2023-01-01-00:00:00.000,6,127503,1,255,20,04,01,f2,ff,ff,ff,ff,ff,ff,fe,ff,ff,ff,ff,ff,ff,ff,00,00,ff"  # from susteranna2020.raw
