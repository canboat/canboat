- raw: "2023-01-01-00:00:00.000,6,127503,1,255,20,00,01,f5,00,ff,ff,ff,ff,ff,ff,ff,ff,ff,ff,ff,ff,ff,ff,ff,7f"  # from pgn127504.raw
  expects:
    instance: 0
    numberOfLines: 1
    line: "Line 2"
