- id: errorCounter
  name: ERROR Counter
  type: UINT32
- id: switchStatus
  name: Switch Status
  type: LOOKUP
  bits: 2
  lookup: OFF_ON
- id: reserved12
  name: Reserved
  type: RESERVED
  bits: 6
