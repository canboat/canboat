pgn: 130822
id: navicoConfigurationSet
description: 'Navico: Configuration Set'
type: Fast
variantOrder: 4
priority: 3
missing:
- Fields
- FieldLengths
- Resolution
explanation: 'Command 3, formerly documented as ''Bulk Report 3''; despite that name it carries a single small per-object
  update, not a bulk/multi-item transfer. Unlike Command 1 ''Source Report'' (which continually re-broadcasts its whole table),
  Command 3 is change-driven - it is only sent when the object''s value changes. Every frame observed so far carries exactly
  one Section 10 (0x0A) record at Item 1. Most Navico/Simnet parameter settings are read/written over PGN 130845 (Simnet:
  Key Value) instead; this PGN only carries the handful of settings - wind/depth-speed source selection and True wind direction
  damping - that PGN 130845 does not.'
researchDoc: navico_udb
