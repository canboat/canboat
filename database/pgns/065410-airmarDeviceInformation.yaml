pgn: 65410
id: airmarDeviceInformation
description: 'Airmar: Device Information'
type: Single
priority: 7
interval: irregular
missing:
- Fields
- FieldLengths
- Resolution
url: https://web.archive.org/web/20230330115009/www.airmartechnology.com/uploads/installguide/DST200UserlManual.pdf
fields:
- id: manufacturerCode
  name: Manufacturer Code
  type: LOOKUP
  bits: 11
  description: Airmar
  match: 135
  lookup: MANUFACTURER_CODE
- id: reserved
  name: Reserved
  type: RESERVED
  bits: 2
- id: industryCode
  name: Industry Code
  type: LOOKUP
  bits: 3
  description: Marine Industry
  match: 4
  lookup: INDUSTRY_CODE
- id: sid
  name: SID
  type: UINT8
- id: internalDeviceTemperature
  name: Internal Device Temperature
  type: TEMPERATURE
- id: supplyVoltage
  name: Supply Voltage
  type: VOLTAGE_UFIX16_10MV
- id: reserved7
  name: Reserved
  type: RESERVED
  bits: 8
