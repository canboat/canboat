pgn: 127507
id: chargerStatus
description: Charger Status
type: Fast
priority: 6
interval: 1500
fields:
- id: instance
  name: Instance
  type: UINT8
  primaryKey: true
- id: batteryInstance
  name: Battery Instance
  type: UINT8
  primaryKey: true
- id: operatingState
  name: Operating State
  type: LOOKUP
  bits: 4
  lookup: CHARGER_STATE
- id: chargeMode
  name: Charge Mode
  type: LOOKUP
  bits: 4
  lookup: CHARGER_MODE
- id: enabled
  name: Enabled
  type: LOOKUP
  bits: 2
  lookup: OFF_ON
- id: equalizationPending
  name: Equalization Pending
  type: LOOKUP
  bits: 2
  lookup: OFF_ON
- id: reserved
  name: Reserved
  type: RESERVED
  bits: 4
- id: equalizationTimeRemaining
  name: Equalization Time Remaining
  type: DURATION_UFIX16_MIN
notes: https://osukl.com/wp-content/uploads/2020/02/3155_User-Manual_-Rev_1.21_.pdf
samples:
- raw: "2023-01-01-00:00:00.000,6,127507,225,255,8,00,06,00,ff,f8,fd,ff,ff"  # from PGN127507.raw
  expects:
    instance: 0
    batteryInstance: ~
    operatingState: "Disabled"
    chargeMode: ~
    enabled: "On"
    equalizationPending: ~
    equalizationTimeRemaining: ~
- raw: "2023-01-01-00:00:00.000,7,127507,1,255,3,00,01,f0"  # from susteranna2020.raw
  expects:
    instance: 240
    batteryInstance: ~
    operatingState: ~
    chargeMode: ~
    enabled: ~
    equalizationPending: ~
    equalizationTimeRemaining: ~
- raw: "2023-01-01-00:00:00.000,6,127507,129,255,8,00,06,31,00,08,fc,ff,ff"  # from PGN127507.raw
  expects:
    instance: 49
    batteryInstance: 0
    operatingState: "Disabled"
    chargeMode: "Standalone"
    enabled: "Off"
    equalizationPending: ~
    equalizationTimeRemaining: ~
