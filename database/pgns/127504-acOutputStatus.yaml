pgn: 127504
id: acOutputStatus
description: AC Output Status
type: Fast
priority: 6
interval: 1500
url: https://web.archive.org/web/20161130030724/http://www.nmea.org/Assets/nmea-2000-corrigendum-1-2010-1.pdf
fields:
- id: instance
  name: Instance
  type: UINT8
  primaryKey: true
- id: numberOfLines
  name: Number of Lines
  type: UINT8
- repeat:
    countField: numberOfLines
    fields:
    - id: line
      name: Line
      type: LOOKUP
      bits: 2
      lookup: LINE
    - id: waveform
      name: Waveform
      type: LOOKUP
      bits: 3
      lookup: WAVEFORM
    - id: reserved
      name: Reserved
      type: RESERVED
      bits: 3
    - id: voltage
      name: Voltage
      type: VOLTAGE_UFIX16_10MV
    - id: current
      name: Current
      type: CURRENT_UFIX16_DA
    - id: frequency
      name: Frequency
      type: FREQUENCY_UFIX16
      resolution: 0.01
    - id: breakerSize
      name: Breaker Size
      type: CURRENT_UFIX16_DA
    - id: realPower
      name: Real Power
      type: POWER_UINT32
    - id: reactivePower
      name: Reactive Power
      type: POWER_UINT32_VAR
    - id: powerFactor
      name: Power factor
      type: INT8
      resolution: 0.01
      unit: Cos Phi
      rangeMin: -1.0
      rangeMax: 1.0
samples:
- raw: "2023-01-01-00:00:00.000,6,127504,1,255,20,00,01,e1,00,05,2c,01,88,13,e8,03,80,15,00,00,80,15,00,00,64"  # from pgn127504.raw
  expects:
    instance: 0
    numberOfLines: 1
    line: "Line 2"
    waveform: "Sine wave"
    voltage: 12.80
    current: 30.0
    frequency: 50.00
    breakerSize: 100.0
    realPower: 5504
    reactivePower: 5504
    powerFactor: 1.00
- raw: "2023-01-01-00:00:00.000,6,127504,1,255,20,01,01,fc,ff,ff,ff,ff,ff,ff,fe,ff,ff,ff,ff,ff,ff,ff,00,00,ff"  # from susteranna2020.raw
  expects:
    instance: 1
    numberOfLines: 1
    line: "Line 1"
    waveform: ~
    voltage: ~
    current: ~
    frequency: ~
    breakerSize: "OutOfRange"
    realPower: ~
    reactivePower: 65535
    powerFactor: -0.01
- raw: "2023-01-01-00:00:00.000,6,127504,1,255,20,00,01,e4,00,05,2c,01,88,13,e8,03,80,15,00,00,80,15,00,00,7f"  # from pgn127504.raw
  expects:
    instance: 0
    numberOfLines: 1
    line: "Line 1"
    waveform: "Modified sine wave"
    voltage: 12.80
    current: 30.0
    frequency: 50.00
    breakerSize: 100.0
    realPower: 5504
    reactivePower: 5504
    powerFactor: ~
