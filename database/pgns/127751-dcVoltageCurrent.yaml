  name: SID
  type: UINT8
- id: connectionNumber
  name: Connection Number
  type: UINT8
- id: dcVoltage
  name: DC Voltage
  type: VOLTAGE_UFIX16_100MV
- id: dcCurrent
  name: DC Current
  type: CURRENT_FIX24_CA
- id: reserved
  name: Reserved
  type: RESERVED
  bits: 8
