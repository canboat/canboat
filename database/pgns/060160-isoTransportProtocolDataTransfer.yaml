pgn: 60160
id: isoTransportProtocolDataTransfer
description: ISO Transport Protocol, Data Transfer
type: Single
priority: 6
interval: irregular
explanation: ISO 11783 defines this PGN as part of the Transport Protocol method used for transmitting messages that have
  9 or more data bytes. This PGN represents a single packet of a multipacket message.
fields:
- id: sid
  name: SID
  type: UINT8
  description: Sequence number of multi-packet frame
- id: data
  name: Data
  type: BINARY
  bits: 56
  description: Multi-packet packetized data - 56 bits organized as seven 8-bit bytes, each of the bytes is transmitted in
    the same order as it would in a standard (i.e., single frame) message. Unused bytes shall be filled with 0xFF.
