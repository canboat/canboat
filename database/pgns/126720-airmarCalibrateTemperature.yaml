- id: temperatureInstance
  name: Temperature instance
  type: LOOKUP
  bits: 2
  lookup: AIRMAR_TEMPERATURE_INSTANCE
  primaryKey: true
- id: reserved6
  name: Reserved
  type: RESERVED
  bits: 6
- id: temperatureOffset
  name: Temperature offset
  type: INT16
  resolution: 0.001
