pgn: 130851
id: simnetApCommandReply
description: 'Simnet: AP command Reply'
type: Fast
variantOrder: 2
priority: 7
missing:
- Fields
- FieldLengths
- Resolution
explanation: 'Reply emitted by the autopilot (NAC-3/AC-42) acknowledging an addressed 130850 ''Simnet: AP command'' by echoing
  it back, byte-for-byte. The autopilot sends exactly one per addressed command (Address = its own NMEA address), within ~20-70
  ms; broadcast commands (Address 0xFF) are not acknowledged.'
researchDoc: navico_alarms_and_commands
