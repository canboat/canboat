pgn: 130851
id: simnetApCommandReply
description: 'Simnet: AP command Reply'
type: Fast
variantOrder: 2
priority: 7
missing:
- Fields
- FieldLengths
- Resolution
explanation: 'Reply emitted by the autopilot (NAC-3/AC-42) acknowledging an addressed 130850 ''Simnet: AP command'' by echoing
  it back, byte-for-byte. The autopilot sends exactly one per addressed command (Address = its own NMEA address), within ~20-70
  ms; broadcast commands (Address 0xFF) are not acknowledged.'
researchDoc: navico_alarms_and_commands
fields:
- id: manufacturerCode
  name: Manufacturer Code
  type: LOOKUP
  bits: 11
  description: Simrad
  match: 1857
  lookup: MANUFACTURER_CODE
- id: reserved
  name: Reserved
  type: RESERVED
  bits: 2
- id: industryCode
  name: Industry Code
  type: LOOKUP
  bits: 3
  description: Marine Industry
  match: 4
  lookup: INDUSTRY_CODE
- id: address
  name: Address
  type: UINT8
  description: NMEA 2000 address of the autopilot that ran the command
- id: reserved5
  name: Reserved
  type: RESERVED
  bits: 8
- id: networkGroup
  name: Network Group
  type: LOOKUP
  bits: 8
  lookup: SIMNET_NETWORK_GROUP
- id: commandType
  name: Command Type
  type: LOOKUP
  bits: 8
  description: AP Command
  match: 10
  lookup: SIMNET_EVENT_TYPE
  primaryKey: true
- id: event
  name: Event
  type: LOOKUP
  bits: 8
  lookup: SIMNET_AP_EVENTS
- id: spare9
  name: Spare
  type: SPARE
  bits: 8
- id: d
  name: D
  type: UINT8
- id: value
  name: Value
  type: UINT16
- id: reserved12
  name: Reserved
  type: RESERVED
  bits: 8
samples:
- raw: "2023-01-01-00:00:00.000,7,130851,2,255,12,41,9f,02,ff,ff,0a,09,00,ff,ff,ff,ff"  # from merrimac-actisense-serial-2011.raw
  expects:
    manufacturerCode: "Simrad"
    industryCode: "Marine Industry"
    address: 2
    networkGroup: ~
    commandType: "AP Command"
    event: "Heading mode"
    d: ~
    value: ~
- raw: "2023-01-01-00:00:00.000,7,130851,13,255,12,41,9f,0d,ff,ff,0a,1c,00,ff,ff,ff,ff"  # from ac42-commissioning.raw
  expects:
    manufacturerCode: "Simrad"
    industryCode: "Marine Industry"
    address: 13
    networkGroup: ~
    commandType: "AP Command"
    event: 28
    d: ~
    value: ~
- raw: "2023-01-01-00:00:00.000,7,130851,4,255,12,41,9f,04,ff,ff,0a,06,00,ff,ff,ff,ff"  # from nac3-reset-dockside-commissioning.raw
  expects:
    manufacturerCode: "Simrad"
    industryCode: "Marine Industry"
    address: 4
    networkGroup: ~
    commandType: "AP Command"
    event: "Standby"
    d: ~
    value: ~
