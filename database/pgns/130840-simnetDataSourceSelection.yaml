pgn: 130840
id: simnetDataSourceSelection
description: 'Simnet: Data Source Selection'
type: Fast
variantOrder: 2
priority: 3
interval: irregular
missing:
- Fields
- FieldLengths
- Resolution
explanation: Change-driven broadcast announcing which source is selected for each Data Type across the instrument network;
  it is the fast-packet answer to the single-frame PGN 65323 poll and shares its Data Type/Source Class namespace. Data Type
  identifies the quantity (heading, depth, wind, ...); Source Class tags the class of source for that quantity (1 = a direct
  sensor/navigation source, 100 = an autopilot-provided source) and is constant per Data Type. Source Address is the current
  NMEA 2000 address of the selected device and Source is that same device's 64-bit NAME (address and NAME both identify the
  one selected source); Change Counter increments on each selection change. See also the periodic UDB table dump in PGN 130822.
researchDoc: navico_udb
fields:
- id: manufacturerCode
  name: Manufacturer Code
  type: LOOKUP
  bits: 11
  description: Simrad
  match: 1857
  lookup: MANUFACTURER_CODE
- id: reserved
  name: Reserved
  type: RESERVED
  bits: 2
- id: industryCode
  name: Industry Code
  type: LOOKUP
  bits: 3
  description: Marine Industry
  match: 4
  lookup: INDUSTRY_CODE
- id: reserved4
  name: Reserved
  type: RESERVED
  bits: 8
- id: dataType
  name: Data Type
  type: LOOKUP
  bits: 8
  lookup: SIMNET_DATA_SOURCE
- id: sourceClass
  name: Source Class
  type: UINT8
  description: 'Class of source for this Data Type, constant per Data Type: observed as 1 for direct sensor/navigation sources
    and 100 for autopilot-provided sources'
- id: sourceAddress
  name: Source Address
  type: UINT8
- id: reserved8
  name: Reserved
  type: RESERVED
  bits: 8
- id: changeCounter
  name: Change Counter
  type: UINT8
- id: source
  name: Source
  type: ISO_NAME
  rangeMin: 0.0
  rangeMax: 1.84467440737096e+19
- id: reserved11
  name: Reserved
  type: RESERVED
  bits: 8
samples:
- raw: "2023-01-01-00:00:00.000,3,130840,30,255,17,41,9f,ff,01,01,18,ff,7f,30,7d,ba,2f,00,be,78,c0,ff"  # from merrimac-2022.raw
  expects:
    manufacturerCode: "Simrad"
    industryCode: "Marine Industry"
    dataType: "Navigation"
    sourceClass: 1
    sourceAddress: 24
    changeCounter: 127
    source: "0x307dba2f00be78c0"
- raw: "2023-01-01-00:00:00.000,3,130840,22,255,17,41,9f,ff,3b,64,fe,ff,ff,ff,ff,ff,ff,ff,ff,ff,ff,ff"  # from nac3-operations.raw
  expects:
    manufacturerCode: "Simrad"
    industryCode: "Marine Industry"
    dataType: "Autopilot Function Backup"
    sourceClass: 100
    sourceAddress: "OutOfRange"
    changeCounter: ~
    source: "0xffffffffffffffff"
- raw: "2023-01-01-00:00:00.000,3,130840,3,255,17,41,9f,ff,36,64,03,ff,00,fb,1b,7d,22,00,96,50,c0,ff"  # from merrimac-2022.raw
  expects:
    manufacturerCode: "Simrad"
    industryCode: "Marine Industry"
    dataType: "Autopilot"
    sourceClass: 100
    sourceAddress: 3
    changeCounter: 0
    source: "0xfb1b7d22009650c0"
