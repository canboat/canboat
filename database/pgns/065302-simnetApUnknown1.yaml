pgn: 65302
id: simnetApUnknown1
description: 'Simnet: AP Unknown 1'
type: Single
priority: 7
interval: 1000
missing:
- Fields
- FieldLengths
- Resolution
explanation: 'Broadcast by the AC (AutoPilot Computer): a constant 0x0A followed by a single 32-bit value (purpose not yet
  identified) and a trailing 0xFF. Observed emitted by the AC-42; the newer NAC-3 does not emit it.'
fields:
- id: manufacturerCode
  name: Manufacturer Code
  type: LOOKUP
  bits: 11
  description: Simrad
  match: 1857
  lookup: MANUFACTURER_CODE
- id: reserved
  name: Reserved
  type: RESERVED
  bits: 2
- id: industryCode
  name: Industry Code
  type: LOOKUP
  bits: 3
  description: Marine Industry
  match: 4
  lookup: INDUSTRY_CODE
- id: type
  name: Type
  type: UINT8
  description: Always 0x0A
- id: value
  name: Value
  type: UINT32
- id: reserved6
  name: Reserved
  type: RESERVED
  bits: 8
samples:
- raw: "2023-01-01-00:00:00.000,7,65302,2,255,8,41,9f,0a,0b,00,00,00,ff"  # from merrimac-actisense-serial-2011.raw
  expects:
    manufacturerCode: "Simrad"
    industryCode: "Marine Industry"
    type: 10
    value: 11
- raw: "2023-01-01-00:00:00.000,7,65302,2,255,8,41,9f,0a,49,00,00,28,ff"  # from merrimac-actisense-serial-2011.raw
  expects:
    manufacturerCode: "Simrad"
    industryCode: "Marine Industry"
    type: 10
    value: 671088713
- raw: "2023-01-01-00:00:00.000,7,65302,2,255,8,41,9f,0a,4b,00,00,00,ff"  # from merrimac-actisense-serial-2011.raw
  expects:
    manufacturerCode: "Simrad"
    industryCode: "Marine Industry"
    type: 10
    value: 75
