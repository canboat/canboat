pgn: 130845
id: furunoMultiSatsInViewExtended
description: 'Furuno: Multi Sats In View Extended'
type: Fast
variantOrder: 2
fields:
- id: manufacturerCode
  name: Manufacturer Code
  type: LOOKUP
  bits: 11
  description: Furuno
  match: 1855
  lookup: MANUFACTURER_CODE
- id: reserved
  name: Reserved
  type: RESERVED
  bits: 2
- id: industryCode
  name: Industry Code
  type: LOOKUP
  bits: 3
  description: Marine Industry
  match: 4
  lookup: INDUSTRY_CODE
- id: reportType
  name: Report type
  type: UNSIGNED_INTEGER
  bits: 4
- id: antenna
  name: Antenna
  type: UNSIGNED_INTEGER
  bits: 4
  note: 0..3 = antenna 1..4
- id: pageType
  name: Page type
  type: UNSIGNED_INTEGER
  bits: 4
- id: page
  name: Page
  type: UNSIGNED_INTEGER
  bits: 4
- id: reserved8
  name: Reserved
  type: RESERVED
  bits: 8
- id: satsInUse
  name: Sats in Use
  type: UINT8
  note: SVs used in the solution (subset of Sats in View)
- id: satsInView
  name: Sats in View
  type: UINT8
  note: total SVs this cycle; drives the multi-page record assembly
- repeat:
    fields:
    - id: prn
      name: PRN
      type: UINT8
      description: 1-32 GPS, 33-64 SBAS, 65-96 GLONASS (R=PRN-64), 132-167 Galileo (E=PRN-131), 193-202 QZSS, 201+ BeiDou
    - id: elevation
      name: Elevation
      type: ANGLE_FIX16
    - id: azimuth
      name: Azimuth
      type: ANGLE_FIX16
    - id: snr
      name: SNR
      type: SIGNALTONOISERATIO_FIX16
    - id: rangeResidual
      name: Range residual
      type: DISTANCE_FIX32_MMM
    - id: baselineStatus
      name: Baseline status
      type: BITLOOKUP
      bits: 8
      lookupBits: FURUNO_BASELINE_STATUS
notes: |-
  Each 12-byte SV record is PRN, Elevation, Azimuth, SNR, Range residual, Baseline status. "Sats in
  Use"/"Sats in View" are device totals across pages, not this frame's record count, so the repeating
  set runs to end of data (UINT8_MAX). Reverse-engineered from SCX-20 captures. See #722.
