pgn: 65280
id: bepMarineCzoneCircuitControl
description: 'BEP Marine: CZone Circuit Control'
type: Single
variantOrder: 7
priority: 3
missing:
- Fields
- FieldLengths
- Resolution
explanation: 'CZone circuit control command from a plotter (or other commander) to CZone modules. The plotter broadcasts;
  each module independently checks whether the 16-bit Circuit ID matches one of its own. Observed wire patterns: byte 6 =
  0xF1 for ON commands, 0xF2 for OFF: Level Or Value = 1 (ON) or 2 (OFF) with Command Active and several flag bits asserted.
  The seven Unknown bits in bytes 6-7 have not yet been mapped to specific actions (likely candidates: dim direction, momentary
  vs latched, transient vs persistent, dim ramp-rate select, source priority).'
url: https://github.com/dirkwa/czone-spec/blob/main/spec/pgn-65280.md
