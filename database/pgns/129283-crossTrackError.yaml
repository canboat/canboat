- raw: "2023-01-01-00:00:00.000,3,129283,24,255,8,20,30,00,00,00,00,ff,ff"  # from merrimac-2022.raw
  expects:
    sid: 32
    xteMode: "Autonomous"
    navigationTerminated: "No"
