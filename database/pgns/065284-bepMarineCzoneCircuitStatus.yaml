pgn: 65284
id: bepMarineCzoneCircuitStatus
description: 'BEP Marine: CZone Circuit Status'
type: Single
variantOrder: 3
missing:
- Fields
- FieldLengths
- Resolution
explanation: 'Periodic ''which of my circuits are currently on'' report from a CZone module. Also serves as the module''s
  heartbeat: the plotter''s tLoadGroupMonitorCZone tracks a moving average of inter-arrival deltas (window of last 20 deltas,
  initial baseline 1000 ms) and removes the module from the CZone panel when an inter-arrival delta exceeds 3x the moving
  average. A reasonable broadcast cadence is 0.5 to 2 seconds. There is also a query form (third byte = 0xC8) by which a controller
  asks every module to report; the bitmap bytes are then unused.'
url: https://github.com/dirkwa/czone-spec/blob/main/spec/pgn-65284.md
fields:
- id: manufacturerCode
  name: Manufacturer Code
  type: LOOKUP
  bits: 11
  description: BEP Marine 2
  match: 295
  lookup: MANUFACTURER_CODE
- id: reserved
  name: Reserved
  type: RESERVED
  bits: 2
- id: industryCode
  name: Industry Code
  type: LOOKUP
  bits: 3
  description: Marine Industry
  match: 4
  lookup: INDUSTRY_CODE
- id: dipswitch
  name: Dipswitch
  type: UINT8
- id: type
  name: Type
  type: UINT8
  description: Observed 0x0F for circuit-state reports
- id: bitmap
  name: Bitmap
  type: BINARY
  bits: 32
  description: 32-bit bitmap of circuits, LSB-first; bit n set => circuit at slot n is ON
samples:
- raw: "2023-01-01-00:00:00.000,7,65284,1,255,8,27,99,ff,08,00,00,00,00"  # from susteranna2020.raw
  expects:
    manufacturerCode: "BEP Marine 2"
    industryCode: "Marine Industry"
    dipswitch: ~
    type: 8
    bitmap: "0x00000000"
