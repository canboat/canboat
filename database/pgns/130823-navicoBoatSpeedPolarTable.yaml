pgn: 130823
id: navicoBoatSpeedPolarTable
description: 'Navico: Boat Speed Polar Table'
type: Fast
variantOrder: 3
missing:
- Fields
- FieldLengths
- Resolution
explanation: Boat-speed (target performance) polar table, produced only by the B&G Hercules performance processor. It is emitted
  as a one-shot burst of several parts (Report Type 15, Part numbers 1..N, ~20 ms apart) that must be concatenated by Part
  number beyond normal fast-packet reassembly. The reassembled stream is a 3-float preamble followed by repeating {uint16
  count}{count x (0x04, float32)} rows; a typical table is 8 rows x 22 columns, the rows stepping the true wind speed 7.5,
  10, 12.5 ... 25 kn and each row ending at true wind angle 180 deg. Because the payload is a stateful multi-part numeric
  table rather than per-frame fields, each part is shown here as raw bytes; reassemble the parts to recover the polar. This
  report is Hercules-only; NEON displays emit the Report Type 5 data-type directory instead.
fields:
- id: manufacturerCode
  name: Manufacturer Code
  type: LOOKUP
  bits: 11
  description: Navico
  match: 275
  lookup: MANUFACTURER_CODE
- id: reserved
  name: Reserved
  type: RESERVED
  bits: 2
- id: industryCode
  name: Industry Code
  type: LOOKUP
  bits: 3
  description: Marine Industry
  match: 4
  lookup: INDUSTRY_CODE
- id: reserved4
  name: Reserved
  type: RESERVED
  bits: 8
- id: spare5
  name: Spare
  type: SPARE
  bits: 8
- id: reportType
  name: Report Type
  type: UINT8
  description: Boat-speed polar / performance table
  match: 15
- id: part
  name: Part
  type: UINT8
  description: Part number; the table is split across several parts that must be concatenated in order
- id: spare8
  name: Spare
  type: SPARE
  bits: 8
- id: data
  name: Data
  type: BINARY
  bits: 1784
  description: Raw table fragment carried by this part
