- id: command
  name: Command
  type: UNSIGNED_INTEGER
  bits: 14
  description: Command selector; 49 keeps the addressed device awake
- id: reserved5
  name: Reserved
  type: RESERVED
  bits: 1
- id: reply
  name: Reply
  type: UNSIGNED_INTEGER
  bits: 1
  description: 0 = request, 1 = reply
- id: value
  name: Value
  type: BINARY
  bits: 32
  description: Only meaningful in a reply (carries a status); left unset (0xFF) in a request
