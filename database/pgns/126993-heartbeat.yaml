pgn: 126993
id: heartbeat
description: Heartbeat
type: Single
priority: 7
interval: 60000
explanation: 'Reception of this PGN confirms that a device is still present on the network.  Reception of this PGN may also
  be used to maintain an address to NAME association table within the receiving device.  The transmission interval may be
  used by the receiving unit to determine the time-out value for the connection supervision.  The value contained in Field
  1 of this PGN reflects the PGN''s current Transmission Interval. Changes to this PGN''s Transmission Interval shall be reflected
  in Field 1.  The transmission interval can only be changed by using the Request Group Function PGN 126208 with no pairs
  of request parameters provided. Field 3 of the Request Group Function PGN 126208 may contain values between 1,000ms and
  60,000ms.  This PGN cannot be requested by the ISO Request PGN 059904 or Request Group Function PGN 126208. In Request Group
  Function PGN 126208, setting Field 3 to a value of 0xFFFF FFFF and Field 4 to a value of 0xFFFF: ''Transmit now without
  changing timing variables.'' is prohibited.  The Command Group Function PGN 126208 shall not be used with this PGN.  Fields
  3 and 4 of this PGN provide information which can be used to distinguish short duration disturbances from permanent failures.
  See ISO 11898 -1 Sections 6.12, 6.13, 6.14, 13.1.1, 13.1.4, 13.1.4.3 and Figure 16 ( node status transition diagram) for
  additional context.'
url: https://web.archive.org/web/20170609023206/http://www.nmea.org/Assets/20140102%20nmea-2000-126993%20heartbeat%20pgn%20corrigendum.pdf
fields:
- id: dataTransmitOffset
  name: Data transmit offset
  type: DURATION_UFIX16_MS
  description: 'Offset in transmit time from time of request command: 0x0 = transmit immediately, 0xFFFF = Do not change offset.'
- id: sequenceCounter
  name: Sequence Counter
  type: UINT8
- id: controller1State
  name: Controller 1 State
  type: LOOKUP
  bits: 2
  lookup: CONTROLLER_STATE
- id: controller2State
  name: Controller 2 State
  type: LOOKUP
  bits: 2
  lookup: CONTROLLER_STATE
- id: equipmentStatus
  name: Equipment Status
  type: LOOKUP
  bits: 2
  lookup: EQUIPMENT_STATUS
- id: reserved
  name: Reserved
  type: RESERVED
  bits: 34
