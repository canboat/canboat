- raw: "2023-01-01-00:00:00.000,6,130837,72,255,23,89,98,02,02,ff,ff,ff,ff,ff,ff,03,f5,ec,00,3c,cc,52,01,a7,a4,c8,00,fd"  # from dirona-actisense-serial.raw
