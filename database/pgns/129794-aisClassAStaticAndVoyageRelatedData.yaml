pgn: 129794
id: aisClassAStaticAndVoyageRelatedData
description: AIS Class A Static and Voyage Related Data
type: Fast
priority: 6
interval: irregular
url: https://web.archive.org/web/20251212005646/www.itu.int/rec/R-REC-M.1371-5-201402-I/en
fields:
- id: messageId
  name: Message ID
  type: LOOKUP
  bits: 6
  lookup: AIS_MESSAGE_ID
- id: repeatIndicator
  name: Repeat Indicator
  type: LOOKUP
  bits: 2
  lookup: REPEAT_INDICATOR
- id: userId
  name: User ID
  type: MMSI
  primaryKey: true
  rangeMin: 2000000.0
  rangeMax: 999999999.0
- id: imoNumber
  name: IMO number
  type: UINT32
- id: callsign
  name: Callsign
  type: STRING_FIX
  bits: 56
- id: name
  name: Name
  type: STRING_FIX
  bits: 160
- id: typeOfShip
  name: Type of ship
  type: LOOKUP
  bits: 8
  lookup: SHIP_TYPE
- id: length
  name: Length
  type: LENGTH_UFIX16_DM
- id: beam
  name: Beam
  type: LENGTH_UFIX16_DM
- id: positionReferenceFromStarboard
  name: Position reference from Starboard
  type: LENGTH_UFIX16_DM
- id: positionReferenceFromBow
  name: Position reference from Bow
  type: LENGTH_UFIX16_DM
- id: etaDate
  name: ETA Date
  type: DATE
- id: etaTime
  name: ETA Time
  type: TIME
  bits: 32
  resolution: 0.0001
  description: Seconds since midnight
  specialValues: 3
  rangeMin: 0.0
  rangeMax: 86401.0
- id: draft
  name: Draft
  type: LENGTH_UFIX16_CM
- id: destination
  name: Destination
  type: STRING_FIX
  bits: 160
- id: aisVersionIndicator
  name: AIS version indicator
  type: LOOKUP
  bits: 2
  lookup: AIS_VERSION
- id: gnssType
  name: GNSS type
  type: LOOKUP
  bits: 4
  lookup: POSITION_FIX_DEVICE
- id: dte
  name: DTE
  type: LOOKUP
  bits: 1
  lookup: AVAILABLE
- id: reserved
  name: Reserved
  type: RESERVED
  bits: 1
- id: aisTransceiverInformation
  name: AIS Transceiver information
  type: LOOKUP
  bits: 5
  lookup: AIS_TRANSCEIVER
- id: reserved21
  name: Reserved
  type: RESERVED
  bits: 3
notes: https://web.archive.org/web/20100527193521/www.navcen.uscg.gov/enav/ais/AIS_messages.htm
