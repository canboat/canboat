pgn: 65420
id: simnetApUnknown3
description: 'Simnet: AP Unknown 3'
type: Single
priority: 6
interval: 1000
missing:
- Fields
- FieldLengths
- Resolution
explanation: 'Broadcast by the AC (AutoPilot Computer): the low nibble of byte 6 is a sub-index selecting which internal variable
  is reported (sub-index 0 and 1 observed); the high nibble is always 0xF. Observed emitted by the AC-42; the newer NAC-3
  does not emit it.'
fields:
- id: manufacturerCode
  name: Manufacturer Code
  type: LOOKUP
  bits: 11
  description: Simrad
  match: 1857
  lookup: MANUFACTURER_CODE
- id: reserved
  name: Reserved
  type: RESERVED
  bits: 2
- id: industryCode
  name: Industry Code
  type: LOOKUP
  bits: 3
  description: Marine Industry
  match: 4
  lookup: INDUSTRY_CODE
- id: value
  name: Value
  type: UINT16
- id: c
  name: C
  type: UINT8
- id: d
  name: D
  type: UINT8
- id: subIndex
  name: Sub Index
  type: UNSIGNED_INTEGER
  bits: 4
  description: Selects the reported variable (0 and 1 seen)
- id: reserved8
  name: Reserved
  type: RESERVED
  bits: 4
- id: reserved9
  name: Reserved
  type: RESERVED
  bits: 8
