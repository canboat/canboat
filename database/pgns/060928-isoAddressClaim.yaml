pgn: 60928
id: isoAddressClaim
description: ISO Address Claim
type: Single
priority: 6
interval: irregular
explanation: This network management message is used to claim network address, reply to devices requesting the claimed address,
  and to respond with device information (NAME) requested by the ISO Request or Complex Request Group Function. This PGN contains
  several fields that are requestable, either independently or in any combination. Note that there are several places where
  this 64-bit data also occurs, these are named ISO_NAME and can be recursively explained.
url: https://web.archive.org/web/20150910070107/http://www.nmea.org/Assets/20140710%20nmea-2000-060928%20iso%20address%20claim%20pgn%20corrigendum.pdf
fields:
- id: uniqueNumber
  name: Unique Number
  type: UNSIGNED_INTEGER
  bits: 21
  description: ISO Identity Number
- id: manufacturerCode
  name: Manufacturer Code
  type: LOOKUP
  bits: 11
  lookup: MANUFACTURER_CODE
- id: deviceInstanceLower
  name: Device Instance Lower
  type: UNSIGNED_INTEGER
  bits: 3
  description: ISO ECU Instance
  specialValues: 0
  rangeMin: 0.0
  rangeMax: 7.0
- id: deviceInstanceUpper
  name: Device Instance Upper
  type: UNSIGNED_INTEGER
  bits: 5
  description: ISO Function Instance
  specialValues: 0
  rangeMin: 0.0
  rangeMax: 31.0
- id: deviceFunction
  name: Device Function
  type: INDIRECT_LOOKUP
  bits: 8
  description: ISO Function
  lookupIndirect:
    name: DEVICE_FUNCTION
    order: 7
- id: spare
  name: Spare
  type: SPARE
  bits: 1
- id: deviceClass
  name: Device Class
  type: LOOKUP
  bits: 7
  lookup: DEVICE_CLASS
- id: systemInstance
  name: System Instance
  type: UNSIGNED_INTEGER
  bits: 4
  description: ISO Device Class Instance
- id: industryGroup
  name: Industry Group
  type: LOOKUP
  bits: 3
  lookup: INDUSTRY_CODE
- id: arbitraryAddressCapable
  name: Arbitrary address capable
  type: LOOKUP
  bits: 1
  description: Field indicates whether the device is capable to claim arbitrary source address. Value is 1 for NMEA200 devices.
    Could be 0 for J1939 device claims
  lookup: YES_NO
  allowLookupWidthMismatch: true
