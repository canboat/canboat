pgn: 129039
id: aisClassBPositionReport
description: AIS Class B Position Report
type: Fast
priority: 4
interval: irregular
url: https://web.archive.org/web/20251212005646/www.itu.int/rec/R-REC-M.1371-5-201402-I/en
fields:
- id: messageId
  name: Message ID
  type: LOOKUP
  bits: 6
  lookup: AIS_MESSAGE_ID
- id: repeatIndicator
  name: Repeat Indicator
  type: LOOKUP
  bits: 2
  lookup: REPEAT_INDICATOR
- id: userId
  name: User ID
  type: MMSI
  primaryKey: true
  rangeMin: 2000000.0
  rangeMax: 999999999.0
- id: longitude
  name: Longitude
  type: GEO_LON_FIX32
  rangeMin: -180.0
  rangeMax: 180.0
- id: latitude
  name: Latitude
  type: GEO_LAT_FIX32
  rangeMin: -90.0
  rangeMax: 90.0
- id: positionAccuracy
  name: Position Accuracy
  type: LOOKUP
  bits: 1
  lookup: POSITION_ACCURACY
- id: raim
  name: RAIM
  type: LOOKUP
  bits: 1
  lookup: RAIM_FLAG
- id: timeStamp
  name: Time Stamp
  type: LOOKUP
  bits: 6
  lookup: TIME_STAMP
- id: cog
  name: COG
  type: ANGLE_UFIX16
- id: sog
  name: SOG
  type: SPEED_UFIX16_CM
- id: communicationState
  name: Communication State
  type: BINARY
  bits: 19
  description: Information used by the TDMA slot allocation algorithm and synchronization information
- id: aisTransceiverInformation
  name: AIS Transceiver information
  type: LOOKUP
  bits: 5
  lookup: AIS_TRANSCEIVER
- id: heading
  name: Heading
  type: ANGLE_UFIX16
  description: True heading
- id: regionalApplication
  name: Regional Application
  type: SPARE
  bits: 8
- id: regionalApplicationB
  name: Regional Application B
  type: SPARE
  bits: 2
- id: unitType
  name: Unit type
  type: LOOKUP
  bits: 1
  lookup: AIS_TYPE
- id: integratedDisplay
  name: Integrated Display
  type: LOOKUP
  bits: 1
  description: Whether the unit can show messages 12 and 14
  lookup: YES_NO
  allowLookupWidthMismatch: true
- id: dsc
  name: DSC
  type: LOOKUP
  bits: 1
  lookup: YES_NO
  allowLookupWidthMismatch: true
- id: band
  name: Band
  type: LOOKUP
  bits: 1
  lookup: AIS_BAND
- id: canHandleMsg22
  name: Can handle Msg 22
  type: LOOKUP
  bits: 1
  lookup: YES_NO
  allowLookupWidthMismatch: true
- id: aisMode
  name: AIS mode
  type: LOOKUP
  bits: 1
  lookup: AIS_MODE
- id: aisCommunicationState
  name: AIS communication state
  type: LOOKUP
  bits: 1
  lookup: AIS_COMMUNICATION_STATE
- id: reserved
  name: Reserved
  type: RESERVED
  bits: 15
