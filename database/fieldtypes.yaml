- name: DECIMAL
  description: An unsigned numeric value where each byte holds the binary value of two decimal digits (0..99)
  encodingDescription: Each byte contains the binary value of two decimal digits, so 1234 is represented by 2 bytes containing
    0x0c (=12) and 0x22 (=34). This is NOT BCD. A value with an odd number of digits is padded with a trailing zero, e.g.
    the 9-digit MMSI 512000953 is encoded as 5120009530 (5 bytes).
  print: fieldPrintDecimal
  signed: false
- name: LOOKUP
  description: Number value where each value encodes for a distinct meaning
  encodingDescription: Each lookup has a LookupEnumeration defining what the possible values mean
  comment: 'For almost all lookups the list of values is known with some precision, but it is quite possible that a value
    occurs that has no corresponding textual explanation. Generally the same special values for Error (max value - 1) and
    Unknown (max value) that are used for plain numbers are also valid for lookups, but some lookups define a lookup key/value
    pair for the maximum possible value in that field. In fact, recent additions to PGNs such as alerts have two bit lookup
    fields that specify four actual valid values. This makes it impossible to send an unknown value for these fields. '
  sentinels: TopOfRange
  print: fieldPrintLookup
  signed: false
- name: INDIRECT_LOOKUP
  description: Number value where each value encodes for a distinct meaning but the meaning also depends on the value in another
    field
  encodingDescription: Each lookup has a LookupIndirectEnumeration defining what the possible values mean
  comment: For almost all lookups the list of values is known with some precision, but it is quite possible that a value occurs
    that has no corresponding textual explanation.
  sentinels: TopOfRange
  print: fieldPrintLookup
  signed: false
- name: BITLOOKUP
  description: Number value where each bit value encodes for a distinct meaning
  encodingDescription: Each LookupBit has a LookupBitEnumeration defining what the possible values mean. A bitfield can have
    any combination of bits set.
  comment: For almost all lookups the list of values is known with some precision, but it is quite possible that a value occurs
    that has no corresponding textual explanation.
  print: fieldPrintBitLookup
- name: DYNAMIC_FIELD_KEY
  description: Number value where each value encodes for a distinct meaning including a fieldtype of the next variable field;
    generally followed by an optional DYNAMIC_FIELD_LENGTH and a DYNAMIC_FIELD_VALUE field; when there is no DYNAMIC_FIELD_LENGTH
    field the length is contained in the lookup table
  encodingDescription: Each lookup has a LookupFieldTypeEnumeration defining what the possible values mean
  comment: These values have been determined by reverse engineering, given the known values it is anticipated that there are
    unkown enumeration values and some known values have incorrect datatypes
  sentinels: TopOfRange
  print: fieldPrintLookup
  signed: false
- name: DYNAMIC_FIELD_LENGTH
  description: Number value that indicates the length of the following DYNAMIC_FIELD_VALUE field
  sentinels: TopOfRange
  print: fieldPrintNumber
  signed: false
- name: DYNAMIC_FIELD_VALUE
  description: Variable field whose type and length is dynamic
  encodingDescription: The type definition of the field is defined by an earlier LookupFieldTypeEnumeration field. The length
    is defined by the preceding length field or the length determined by the lookup value.
  sentinels: Variable
  print: fieldPrintKeyValue
