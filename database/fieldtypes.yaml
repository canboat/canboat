  description: An unsigned numeric value where the Least Significant Bit does not encode the integer value 1
  encodingDescription: The `Resolution` attribute indicates what the raw value 1 should represent. The `Signed` and `BitLength`
    attributes are always present. Together, this gives sufficient information to represent a fixed point number in a particular
    range where non-integral values can be encoded without requiring four or eight bytes for a floating point number.
  url: https://en.wikipedia.org/wiki/Fixed-point_arithmetic
  signed: false
- name: SIGNED_FIXED_POINT_NUMBER
