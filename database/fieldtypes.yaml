- name: STRING_FIX
  description: A fixed length string containing single byte codepoints.
  encodingDescription: 'This always takes up as many bytes as defined in the field definition. Three end-of-string characters
    are seen: 0xff (255), the standard NMEA 2000 "Unknown" value. ''@'', the standard AIS "Unknown" value for strings. 0x00,
    the standard C end-of-string marker. It is encouraged to stop the string at the first such character (and not make it
    part of the string). An empty string can be considered to make the entire field "Unknown".'
  comment: It is unclear what character sets are allowed/supported. Possibly UTF-8 but it could also be that only ASCII values
    are supported.
  sentinels: EmptyString
  print: fieldPrintStringFix
- name: STRING_LZ
  description: A varying length string containing single byte codepoints encoded with a length byte and terminating zero.
  encodingDescription: The length of the string is determined by a starting length byte. It also contains a terminating zero
    byte. The length byte includes neither the zero byte or itself. The character encoding is UTF-8.
  comment: This type of string is found only in SonicHub and Fusion brand specific PGNs. SonicHub is no longer produced. The
    use of the Fusion specific PGNs is no longer very prevalent now that there are generic PGNs for audio/media devices.
  variableSize: true
  sentinels: EmptyString
  print: fieldPrintStringLZ
- name: STRING_LAU
  description: A varying length string containing double or single byte codepoints encoded with a length byte and terminating
    zero.
  encodingDescription: The length of the string is determined by a starting length byte. This count includes the length and
    type bytes, so any empty string contains count 2. The 2nd byte contains 0 for UNICODE or 1 for ASCII.
  variableSize: true
  sentinels: EmptyString
  print: fieldPrintStringLAU
- name: BINARY
  description: Binary field
  encodingDescription: Unspecified content consisting of any number of bits.
  print: fieldPrintBinary
- name: RESERVED
  description: Reserved field
  encodingDescription: All reserved bits shall be 1
  comment: NMEA reserved for future expansion and/or to align next data on byte boundary
  print: fieldPrintReserved
- name: SPARE
  description: Spare field
  encodingDescription: All spare bits shall be 0
  comment: This is like a reserved field but originates from other sources where unused fields shall be 0, like the AIS ITU-1371
    standard.
  print: fieldPrintSpare
- name: MMSI
  description: MMSI
  encodingDescription: The MMSI is encoded as a 32 bit number, but is always printed as a 9 digit number and should be considered
    as a string. The first three or four digits are special, see the USCG link for a detailed explanation.
  url: https://navcen.uscg.gov/maritime-mobile-service-identity
  bits: 32
  resolution: 1.0
  print: fieldPrintMMSI
  rangeMin: 2000000.0
  rangeMax: 999999999.0
  signed: false
- name: VARIABLE
  description: Variable
  encodingDescription: The definition of the field is that of the reference PGN and reference field, this is totally variable.
  variableSize: true
  print: fieldPrintVariable
- name: FIELD_INDEX
  description: Field Index
  encodingDescription: Index of the specified field in the PGN referenced.
  bits: 8
  resolution: 1.0
  sentinels: TopOfRange
  print: fieldPrintNumber
  rangeMin: 0.0
  rangeMax: 252.0
  signed: false
