  encodingDescription: This uses an offset, so 0 encodes the maximum negative value -2000000000, and 0 is represented by 2000000000.
    Depending on the field it represents either real power in W, active power in VA or reactive power in VAR.
  offset: -2000000000
  resolution: 1.0
  physical: ELECTRICAL_REACTIVE_POWER
