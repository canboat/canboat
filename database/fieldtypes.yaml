- name: NUMBER
  description: Number
  encodingDescription: Binary numbers are little endian. Number fields that are at least two bits in length use the highest
    positive value to represent unknown. Number fields with at least 7 as maximum (3 bits unsigned, 4 bits signed) use the
    highest value minus one as an error indicator. This is likely also true for numbers where 3 is the maximum value, but
    there are few fields that have this length -- certainly as a number, there are a lot of lookup fields of two bits length.  For
    signed numbers the maximum values are the maximum positive value and that minus 1, not the all-ones bit encoding which
    is the maximum negative value.
  url: https://en.wikipedia.org/wiki/Binary_number
  sentinels: TopOfRange
  print: fieldPrintNumber
