pgn: 65226
id: activeTroubleCodes
description: Active Trouble Codes
type: Single
missing:
- Fields
- FieldLengths
- Resolution
fields:
- id: malfunctionLampStatus
  name: Malfunction Lamp Status
  type: BINARY
  bits: 2
  description: Fault Lamps
- id: redStopLampStatus
  name: Red Stop Lamp Status
  type: BINARY
  bits: 2
  description: Fault Lamps
  note: 10 = flashing 1Hz, 11 = flashing 2Hz
- id: amberWarningLampStatus
  name: Amber Warning Lamp Status
  type: BINARY
  bits: 2
  description: Fault Lamps
- id: protectLampStatus
  name: Protect Lamp Status
  type: BINARY
  bits: 2
  description: Fault Lamps
- id: reserved
  name: Reserved
  type: RESERVED
  bits: 8
- repeat:
    fields:
    - id: spn
      name: SPN
      type: BINARY
      bits: 19
      description: Suspect Parameter Number
      note: These four fields comprise a Diagnostic Trouble Code (DTC)
    - id: fmi
      name: FMI
      type: BINARY
      bits: 5
      description: Fault Mode Indicator
      note: If there is more han one DTC the message is sent using TP
    - id: cm
      name: CM
      type: BINARY
      bits: 1
      description: SPN Conversion Method
      note: Not sure how to handle that actually...
    - id: oc
      name: OC
      type: BINARY
      bits: 7
      description: Occurance Count
notes: |-
  J1939 PGN 65226 See https://embeddedflakes.com/j1939-diagnostics-part-1/

  Lamp modes are: 0 = off, 01 = on
